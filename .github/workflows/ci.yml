name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    outputs:
      hash-fixed: ${{ steps.fix-hash.outputs.fixed }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.head_ref || github.ref }}

    - name: Install Nix
      uses: cachix/install-nix-action@v31

    - name: Setup Cachix
      uses: cachix/cachix-action@v17
      with:
        name: ak2k
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

    - name: Nix flake check
      id: flake-check
      run: nix flake check
      continue-on-error: true

    - name: Nix build
      id: nix-build
      run: nix build
      continue-on-error: true

    - name: Fix vendorHash on failure
      id: fix-hash
      if: (steps.flake-check.outcome == 'failure' || steps.nix-build.outcome == 'failure') && github.event_name == 'pull_request'
      run: |
        echo "Build failed, attempting vendorHash fix with nix-update..."
        nix shell nixpkgs#nix-update -c nix-update --flake --version=skip default
        if git diff --quiet flake.nix; then
          echo "nix-update made no changes — failure is not a hash issue"
          echo "fixed=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        echo "vendorHash updated, pushing fix..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add flake.nix
        git commit -m "fix: update vendorHash for Nix build"
        git push
        echo "fixed=true" >> "$GITHUB_OUTPUT"

    - name: Fail if build broken and not fixable
      if: (steps.flake-check.outcome == 'failure' || steps.nix-build.outcome == 'failure') && steps.fix-hash.outcome != 'success'
      run: exit 1

  go-build:
    name: Go Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Vet
      run: go vet ./...

  auto-merge-dependabot:
    name: Auto-merge Dependabot
    needs: [nix-build, go-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
    - name: Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v3
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Merge patch/minor
      if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
      run: gh pr merge --squash --delete-branch --repo "$GITHUB_REPOSITORY" "${{ github.event.pull_request.number }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Comment on major updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-major'
      run: gh pr comment "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --body "Major version update — requires manual review."
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
