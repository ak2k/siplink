name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.get_tag.outputs.tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get tag name
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Generate changelog
      id: changelog
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
        else
          CHANGELOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
        fi
        echo "$CHANGELOG" > changelog.txt
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat changelog.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_tag.outputs.tag }}
        name: Release ${{ steps.get_tag.outputs.tag }}
        body: |
          ## What's Changed

          ${{ steps.changelog.outputs.changelog }}

          ## Installation

          ### Using Nix
          ```bash
          nix run github:ak2k/siplink -- <source> <destination>
          ```

          ### Binary Downloads
          Download the appropriate binary for your platform below.
        draft: false
        prerelease: false

  build-binaries:
    name: Build Release Binaries
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: siplink-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary_name: siplink-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary_name: siplink-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_name: siplink-darwin-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: go build -v -ldflags="-s -w -X main.version=${{ needs.release.outputs.tag_name }}" -o ${{ matrix.binary_name }} main.go

    - name: Compress binary
      run: tar -czf ${{ matrix.binary_name }}.tar.gz ${{ matrix.binary_name }}

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.release.outputs.tag_name }}
        files: ${{ matrix.binary_name }}.tar.gz

  build-nix:
    name: Build Nix Artifact
    needs: release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Nix
      uses: cachix/install-nix-action@v31

    - name: Setup Cachix
      uses: cachix/cachix-action@v15
      with:
        name: ak2k
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

    - name: Build with Nix
      run: nix build

    - name: Create Nix bundle
      run: |
        cp -L result/bin/siplink siplink-nix
        tar -czf siplink-nix.tar.gz siplink-nix

    - name: Upload Nix artifact
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.release.outputs.tag_name }}
        files: siplink-nix.tar.gz
